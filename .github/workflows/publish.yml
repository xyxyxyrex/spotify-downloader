name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tauri-gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller mutagen

      - name: Build Frozen Binaries and Download dependencies
        run: |
          python tauri-gui/build_binaries.py

      - name: Install Node dependencies
        working-directory: tauri-gui
        run: npm ci

      - name: Clean Signing Key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$RAW_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set in GitHub repository secrets! Tauri updater requires installers to be signed to function."
            echo "To fix this, generate a Tauri signing key using 'tauri signer generate' and add the private key to repository secrets."
            exit 1
          fi
          CLEAN_KEY=$(echo "$RAW_KEY" | tr -d '\r\n ')
          if [ -z "$CLEAN_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty or invalid after whitespace cleaning!"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY=$CLEAN_KEY" >> $GITHUB_ENV

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: 'SpotDL GUI v__VERSION__'
          releaseBody: 'Release notes and binaries for version v__VERSION__.'
          releaseDraft: false
          prerelease: false
          projectPath: tauri-gui

      - name: Auto-update updater.json signature
        shell: bash
        run: |
          VERSION=$(node -p "require('./tauri-gui/package.json').version")
          echo "Detected App Version: $VERSION"
          
          # Find signature file locally in target bundle folder
          SIG_FILE=$(find tauri-gui/src-tauri/target -name "*.exe.sig" | head -n 1)
          
          if [ -f "$SIG_FILE" ]; then
            SIG_CONTENT=$(cat "$SIG_FILE")
            echo "Found signature: $SIG_CONTENT"
            
            # Update manifest JSON safely
            node -e "
              const fs = require('fs');
              const path = 'updater.json';
              const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
              manifest.version = '$VERSION';
              manifest.platforms['windows-x86_64'].signature = '$SIG_CONTENT';
              manifest.platforms['windows-x86_64'].url = 'https://github.com/xyxyxyrex/spotify-downloader/releases/download/v$VERSION/SpotDL%20GUI_${VERSION}_x64-setup.exe';
              fs.writeFileSync(path, JSON.stringify(manifest, null, 2) + '\n');
            "
            
            # Commit and push back to master
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add updater.json
            git commit -m "chore: auto-update updater.json signature to v$VERSION [skip ci]"
            git push origin HEAD:master
          else
            echo "::error::No .exe.sig signature file found! Tauri requires setup installer files to be signed for auto-updates to work."
            echo "Ensure that TAURI_SIGNING_PRIVATE_KEY is a valid private key generated by Tauri."
            exit 1
          fi
